name = "wedding"
account_id = "0c03e4760f29cf6a66daa90e7ee3abb3"
compatibility_date = "2024-09-23"
main = "src/worker.js"

routes = [
  { pattern = "wedding.scariot.fr", zone_name = "scariot.fr", custom_domain = true }
]

[assets]
directory = "./dist"
binding = "ASSETS"

[[d1_databases]]
binding = "DB"
database_name = "wedding-rsvps"
database_id = "56972615-11f3-486a-a873-630499c6dfb7"

# Admin password — set via: wrangler secret put ADMIN_PASSWORD
# Site gate password — set via: wrangler secret put SITE_PASSWORD
# GitHub album uploads — set via: wrangler secret put GITHUB_TOKEN
[vars]
GITHUB_REPO = "ekaterinakhan/wedding"
GITHUB_BRANCH = "main"
GITHUB_ALBUM_PATH = "data/photoalbum"
# ADMIN_PASSWORD = "cookie_muffin"  # use `wrangler secret put` instead of hardcoding here
